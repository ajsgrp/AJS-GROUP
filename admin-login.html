<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Login | AJS Group</title>

<link rel="stylesheet" href="style.css">

</head>

<body>
<div class="admin-login">

    <div class="login-box">

        <img src="images/logo.png" alt="AJS Group Logo">

        <h1>AJS GROUP</h1>

        <h2>Administrator Login</h2>

        <form id="admin-login-form">

            <input
                type="email"
                id="admin-email"
                placeholder="Email Address"
                required
            >

            <input
                type="password"
                id="admin-password"
                placeholder="Password"
                required
            >

            <label class="remember">

                <input type="checkbox">

                Remember Me

            </label>

            <button type="submit">

                Login

            </button>

        </form>

        <a href="index.html" class="back-link">

            ← Back to Website

        </a>

    </div>

</div>
</body>

</html>
